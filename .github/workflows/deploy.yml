name: Deploy to server

# Срабатывает при каждом обновлении main — в том числе когда PR из другой ветки
# сливается в main (merge создаёт push в main).
on:
  push:
    branches: [main]
  workflow_dispatch: {}     # позволяет запустить деплой вручную из вкладки Actions

# Не запускать два деплоя одновременно.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          command_timeout: 20m     # хватит на редкую пересборку образа (npm claude-code)
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            # channels.txt не в гите (его правит бот) — подстрахуемся бэкапом на случай reset.
            cp channels.txt channels.txt.bak 2>/dev/null || true

            BEFORE=$(git rev-parse HEAD)
            git fetch --prune origin main
            git reset --hard origin/main
            AFTER=$(git rev-parse HEAD)

            # Если channels.txt отсутствует (первый деплой после вывода из гита) — восстановим.
            [ -f channels.txt ] || cp channels.txt.bak channels.txt 2>/dev/null || true
            [ -f channels.txt ] || cp channels.txt.example channels.txt

            # Docker Compose v2 (docker compose) — v1 (docker-compose) несовместим
            # с новым форматом образов (KeyError: 'ContainerConfig').
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            else
              DC="docker-compose"
            fi

            # Пересобираем образ ТОЛЬКО если менялись Dockerfile/requirements.txt —
            # остальной код (digest.py, paper.py, bot.py, entrypoint.sh) в bind-mount.
            BUILD=""
            if git diff --name-only "$BEFORE" "$AFTER" | grep -qE '^(Dockerfile|requirements\.txt)$'; then
              echo "Dockerfile/requirements изменились — пересобираю образ"
              BUILD="--build"
            fi

            $DC up -d $BUILD
            # restart перечитывает bind-mount для долгоживущих процессов (bot.py, entrypoint.sh);
            # digest.py/paper.py и так запускаются заново по расписанию.
            $DC restart
            docker image prune -f
