services:
  digest:
    build: .
    image: ai-digest
    container_name: ai-digest
    restart: unless-stopped
    env_file: .env
    environment:
      # Таймзона, по которой планировщик срабатывает в RUN_AT. Держите в согласии с DIGEST_TZ в .env.
      TZ: Europe/Moscow
      # Время ежедневного запуска дайджеста (HH:MM). По умолчанию 06:00 — можно не задавать.
      RUN_AT: "06:00"
      # Недельный обзор ключевых новостей: время (HH:MM) и день недели (1=Пн … 7=Вс).
      WEEKLY_AT: "21:00"
      WEEKLY_DOW: "7"
      # Страховка: гарантированно пустой ключ, чтобы claude -p шёл в подписку, а не в платный API.
      ANTHROPIC_API_KEY: ""
    volumes:
      # Код + channels.txt + файл сессии Telethon (digest_session.session) — на хосте, переживают пересборку.
      - .:/app
    # Авторизация Claude — через CLAUDE_CODE_OAUTH_TOKEN из .env (env_file), volume не нужен.
