services:
  digest:
    build: .
    image: ai-digest
    container_name: ai-digest
    restart: unless-stopped
    env_file: .env
    environment:
      # Таймзона, по которой планировщик срабатывает в RUN_AT. Держите в согласии с DIGEST_TZ в .env.
      TZ: Europe/Moscow
      # Время ежедневного запуска дайджеста (HH:MM).
      RUN_AT: "08:00"
      # Ежедневный научный разбор статьи (HH:MM).
      PAPER_AT: "13:00"
      # Недельный обзор ключевых новостей: время (HH:MM) и день недели (1=Пн … 7=Вс).
      WEEKLY_AT: "21:00"
      WEEKLY_DOW: "7"
      # «Живой» вечерний пост (vibe.py): случайная минута в окне, раз в N дней.
      VIBE_WINDOW_START: "18:00"
      VIBE_WINDOW_END: "20:00"
      VIBE_EVERY_DAYS: "2"
      # Страховка: гарантированно пустой ключ, чтобы claude -p шёл в подписку, а не в платный API.
      ANTHROPIC_API_KEY: ""
    volumes:
      # Код + channels.txt + файл сессии Telethon (digest_session.session) — на хосте, переживают пересборку.
      - .:/app
    # Авторизация Claude — через CLAUDE_CODE_OAUTH_TOKEN из .env (env_file), volume не нужен.

  # Бот управления списком каналов: слушает команды (/add, /remove, /list) и правит
  # channels.txt, который дайджест читает при следующем запуске. Тот же образ и mount.
  bot:
    # Использует тот же образ, что собирает сервис digest — без повторной сборки.
    image: ai-digest
    depends_on:
      - digest
    container_name: ai-digest-bot
    restart: unless-stopped
    env_file: .env
    environment:
      ANTHROPIC_API_KEY: ""
    volumes:
      - .:/app
    command: python bot.py
